name: Overlay HyperOS3 language 

on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check Out
      uses: actions/checkout@main

    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt -y install git-core git xmlstarlet

    - name: Build APK's
      run: |
        cd build
        bash build.sh

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        path: |
          product/overlay/*.apk
          META-INF/*
        name: HyperOS3-Overlays-language
